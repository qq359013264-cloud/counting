<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>门店绩效计算</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#f1f5f9;color:#1e293b}.wrap{max-width:1280px;margin:0 auto;padding:20px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px}.title h1{margin:0;font-size:30px}.title p{margin:6px 0 0;color:#64748b}.panel,.card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;box-shadow:0 1px 2px rgba(0,0,0,.04)}.panel{padding:16px;margin-bottom:16px}.info{padding:12px 16px;font-size:14px;line-height:1.8}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.layout{display:grid;grid-template-columns:360px 1fr;gap:16px}.card{padding:16px}.stat-title{font-size:13px;color:#64748b}.stat-value{font-size:24px;font-weight:800;margin-top:4px}.stat-sub{font-size:12px;color:#94a3b8;margin-top:4px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.between{display:flex;justify-content:space-between;gap:12px;align-items:center}.btn{border:1px solid #cbd5e1;background:#fff;border-radius:12px;padding:9px 14px;cursor:pointer;font-weight:600}.btn:hover{background:#f8fafc}.btn.primary{background:#0f172a;color:#fff;border-color:#0f172a}.btn.green{background:#059669;color:#fff;border-color:#059669}.btn.red{background:#dc2626;color:#fff;border-color:#dc2626}.input{border:1px solid #cbd5e1;border-radius:12px;padding:9px 12px;outline:none;min-height:38px}.input:focus{box-shadow:0 0 0 2px #cbd5e1}.person{border:1px solid #e2e8f0;border-radius:16px;padding:12px;margin-bottom:8px;background:#fff}.person.active{border-color:#0f172a;background:#f8fafc}.person-name{font-weight:700;font-size:16px}.small{font-size:12px;color:#64748b}.muted{color:#64748b}.project-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.project{background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;padding:14px;position:relative}.badge{position:absolute;right:12px;top:12px;background:#0f172a;color:#fff;min-width:28px;height:28px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:13px;padding:0 8px}.project-title{font-weight:700;padding-right:38px}.money{color:#64748b;font-size:13px;margin-top:6px}.project-actions{display:flex;gap:8px;margin-top:14px}.project-actions button{flex:1;font-size:20px}.section{margin-top:16px}.section-title{font-weight:800;font-size:18px;margin-bottom:10px}table{width:100%;border-collapse:collapse;font-size:14px}th,td{text-align:left;padding:10px 12px;border-bottom:1px solid #e2e8f0}th{color:#64748b;font-weight:700}.scroll{overflow:auto}.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}.modal-box{background:#fff;border-radius:18px;padding:20px;max-width:380px;width:100%}.hidden{display:none!important}.settings-grid{display:grid;grid-template-columns:1fr 120px 90px;gap:8px;align-items:center}.upload-note{font-size:12px;color:#64748b;line-height:1.7}.manual-grid{display:grid;grid-template-columns:1.2fr 1fr 1fr auto;gap:10px;align-items:end}@media(max-width:760px){.manual-grid,.settings-grid{grid-template-columns:1fr}}@media(max-width:980px){.grid4{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.project-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:640px){.top,.between{flex-direction:column;align-items:stretch}.grid4,.grid3,.project-grid{grid-template-columns:1fr}.wrap{padding:12px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title"><h1>门店绩效计算</h1><p>按城市、人员、项目记录每日绩效，支持日期、区间、月汇总和导出</p></div>
      <div class="panel info" id="dateInfo"></div>
    </div>
    <div class="grid4" id="stats"></div>
    <div class="panel"><div class="between"><div class="row"><b>选择城市：</b><button class="btn" id="cityCs">长沙店</button><button class="btn" id="cityCd">成都店</button></div><div class="row"><span class="muted">选择日期：</span><input class="input" id="selectedDate" type="date"><button class="btn" id="openSettings">单项价格设置</button><button class="btn" id="uploadPerfBtn">上传每日绩效</button><input id="uploadPerfFile" type="file" accept=".csv,.txt" class="hidden"><button class="btn primary" id="exportDay">导出当日 Excel</button></div></div></div>
    <div class="panel"><div class="between"><div><b>直接录入每日绩效</b><div class="small">可直接新增或覆盖某个人某天的绩效，不需要先做单项次数计算。</div></div></div><div class="manual-grid" style="margin-top:12px"><label><span class="small">人员</span><select class="input" id="manualPerson" style="width:100%"></select></label><label><span class="small">日期</span><input class="input" id="manualDate" type="date" style="width:100%"></label><label><span class="small">绩效金额</span><input class="input" id="manualAmount" type="number" min="0" step="0.01" placeholder="例如 328" style="width:100%"></label><button class="btn green" id="saveManualPerf">保存绩效</button></div></div>
    <div class="layout">
      <div class="card"><div class="between"><h2 style="margin:0">人员信息</h2><span class="small" id="cityLabel"></span></div><div class="row" style="margin:14px 0"><input class="input" id="newName" placeholder="输入人员姓名" style="flex:1"><button class="btn primary" id="addPerson">添加</button></div><div id="peopleList"></div></div>
      <div class="card" id="mainPanel"></div>
    </div>
    <div class="card section" id="daySummary"></div>
    <div class="card section" id="rangeSummary"></div>
    <div class="card section" id="monthSummary"></div>
  </div>
  <div class="modal hidden" id="settingsModal"><div class="modal-box" style="max-width:620px"><div class="between"><div><h3 style="margin:0">单项绩效价格设置</h3><div class="small">当前门店：<span id="settingsCity"></span></div></div><button class="btn" id="closeSettings">关闭</button></div><div id="settingsList" style="margin-top:14px;max-height:55vh;overflow:auto"></div><div class="row" style="margin-top:14px"><input class="input" id="newProjectName" placeholder="新增项目名称" style="flex:1"><input class="input" id="newProjectAmount" type="number" min="0" step="0.01" placeholder="金额" style="width:130px"><button class="btn primary" id="addProject">添加项目</button></div><div class="row" style="justify-content:flex-end;margin-top:14px"><button class="btn red" id="resetProjects">恢复默认</button><button class="btn green" id="saveSettings">保存设置</button></div></div></div>
  <div class="modal hidden" id="deleteModal"><div class="modal-box"><h3 style="margin-top:0">确认删除人员</h3><p class="muted" id="deleteText"></p><div class="row" style="justify-content:flex-end"><button class="btn" id="cancelDelete">取消</button><button class="btn red" id="confirmDelete">确认删除</button></div></div></div>
<script>
const STORE_KEY='perf_single_html_v1';
const DEFAULT_PROJECTS={
  '长沙店':[{name:'温馨舒享提成',amount:45},{name:'加钟半小时',amount:50},{name:'加钟一小时',amount:100},{name:'精致乐享',amount:90},{name:'刮痧',amount:32},{name:'艾灸',amount:32},{name:'铜壶',amount:32},{name:'轻奢尊享',amount:130},{name:'采耳',amount:32},{name:'臀疗',amount:130}],
  '成都店':[{name:'海盐舒享',amount:53},{name:'温馨舒享提成',amount:50},{name:'加钟半小时',amount:50},{name:'加钟一小时',amount:100},{name:'精致乐享',amount:90},{name:'刮痧',amount:32},{name:'艾灸',amount:32},{name:'铜壶',amount:32},{name:'轻奢尊享',amount:130},{name:'采耳',amount:32},{name:'臀疗',amount:130}]
};
let state={projectSettings:JSON.parse(JSON.stringify(DEFAULT_PROJECTS)),currentCity:'长沙店',selectedPersonId:null,people:[],selectedDate:today(),selectedMonth:month(),rangeStart:today(),rangeEnd:addDays(today(),15),editingId:null,editName:'',deleteTarget:null};
function today(){return new Date().toISOString().slice(0,10)}function month(){return new Date().toISOString().slice(0,7)}
function addDays(s,n){if(!s)return'';const d=new Date(s+'T00:00:00');if(isNaN(d))return'';d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function inRange(d,s,e){return d&&s&&e&&d>=s&&d<=e}function uid(){return Date.now()+'_'+Math.random().toString(36).slice(2,8)}
function fmtDate(s){return s||''}function projects(city){return state.projectSettings?.[city]||[]}function emptyCounts(city){return Object.fromEntries(projects(city).map(p=>[p.name,0]))}
function load(){try{const raw=localStorage.getItem(STORE_KEY);if(raw){state={...state,...JSON.parse(raw)};state.projectSettings=state.projectSettings||JSON.parse(JSON.stringify(DEFAULT_PROJECTS))}else{state.people=[{id:uid(),name:'张三',city:'长沙店',records:{}},{id:uid(),name:'李四',city:'成都店',records:{}}]}}catch(e){}}
function save(){const keep={projectSettings:state.projectSettings,currentCity:state.currentCity,selectedPersonId:state.selectedPersonId,people:state.people};localStorage.setItem(STORE_KEY,JSON.stringify(keep))}
function selectedPerson(){return state.people.find(p=>p.id===state.selectedPersonId)||null}
function ensureRecord(p,date){p.records=p.records||{};if(!p.records[date])p.records[date]={city:p.city,counts:emptyCounts(p.city),total:0,calculatedAt:'',entryMode:'item'};p.records[date].counts=p.records[date].counts||emptyCounts(p.city);return p.records[date]}
function calcTotal(city,counts){return projects(city).reduce((s,p)=>s+(counts[p.name]||0)*p.amount,0)}
function countTotal(counts){return Object.values(counts||{}).reduce((a,b)=>a+b,0)}
function csv(rows){const esc=v=>'"'+String(v??'').replace(/"/g,'""')+'"';return '\uFEFF'+rows.map(r=>r.map(esc).join(',')).join('\n')}
function exportCsv(rows,name){const blob=new Blob([csv(rows)],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
function peopleInCity(){return state.people.filter(p=>p.city===state.currentCity)}
function daySummary(){return peopleInCity().map(p=>{const r=p.records?.[state.selectedDate];return{id:p.id,name:p.name,city:p.city,total:r?.total||0,count:countTotal(r?.counts)}}).sort((a,b)=>b.total-a.total)}
function monthSummary(){return peopleInCity().map(p=>{const rec=Object.entries(p.records||{}).filter(([d])=>d.startsWith(state.selectedMonth)).map(([d,r])=>({d,total:r.total||0,count:countTotal(r.counts)}));return{id:p.id,name:p.name,city:p.city,days:rec.length,count:rec.reduce((s,x)=>s+x.count,0),total:rec.reduce((s,x)=>s+x.total,0)}}).sort((a,b)=>b.total-a.total)}
function rangeSummary(){return peopleInCity().map(p=>{const rec=Object.entries(p.records||{}).filter(([d])=>inRange(d,state.rangeStart,state.rangeEnd)).map(([d,r])=>({d,total:r.total||0,count:countTotal(r.counts)}));return{id:p.id,name:p.name,city:p.city,days:rec.length,count:rec.reduce((s,x)=>s+x.count,0),total:rec.reduce((s,x)=>s+x.total,0)}}).sort((a,b)=>b.total-a.total)}
function totalOf(arr){return arr.reduce((a,x)=>({days:a.days+x.days,count:a.count+x.count,total:a.total+x.total}),{days:0,count:0,total:0})}
function stat(title,value,sub=''){return `<div class="card"><div class="stat-title">${title}</div><div class="stat-value">${value}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div>`}
function render(){save();const sp=selectedPerson();const rec=sp?(sp.records?.[state.selectedDate]||{counts:emptyCounts(sp.city),total:0}):null;const msum=monthSummary(), rsum=rangeSummary(), mt=totalOf(msum), rt=totalOf(rsum);
 document.getElementById('dateInfo').innerHTML=`今天日期：<b>${today()}</b><br>当前录入日期：<b>${state.selectedDate}</b><br>当前统计月份：<b>${state.selectedMonth}</b>`;
 document.getElementById('stats').innerHTML=stat('当前城市',state.currentCity,'点击按钮切换门店')+stat('已选人员',sp?.name||'未选择','先选人员再计算')+stat('所选日期项目计数',rec?countTotal(rec.counts):0,'右上角小数字为项目次数')+stat('本月全店总绩效','¥'+mt.total,'当前门店和月份');
 document.getElementById('cityCs').className='btn '+(state.currentCity==='长沙店'?'primary':'');document.getElementById('cityCd').className='btn '+(state.currentCity==='成都店'?'primary':'');document.getElementById('cityLabel').textContent=state.currentCity;document.getElementById('selectedDate').value=state.selectedDate;
 renderPeople();renderMain(sp,rec);renderTables(msum,rsum,mt,rt);renderManualPeople();
}
function renderPeople(){const box=document.getElementById('peopleList');const arr=peopleInCity();if(!arr.length){box.innerHTML='<div class="small" style="text-align:center;padding:30px">当前门店还没有人员，请先添加</div>';return}box.innerHTML=arr.map(p=>{const r=p.records?.[state.selectedDate];const editing=state.editingId===p.id;return `<div class="person ${state.selectedPersonId===p.id?'active':''}">${editing?`<input class="input" id="editInput" value="${state.editName.replace(/"/g,'&quot;')}" style="width:100%;margin-bottom:8px"><div class="row"><button class="btn primary" onclick="saveEdit('${p.id}')">保存</button><button class="btn" onclick="cancelEdit()">取消</button></div>`:`<div class="between"><button class="btn" style="border:0;padding:0;background:transparent;text-align:left" onclick="selectPerson('${p.id}')"><div class="person-name">${p.name}</div><div class="small">所选日期绩效：¥${r?.total||0}</div></button><div class="row"><button class="btn" onclick="startEdit('${p.id}')">编辑</button><button class="btn" onclick="askDelete('${p.id}')">删除</button></div></div>`}</div>`}).join('');const inp=document.getElementById('editInput');if(inp){inp.oninput=e=>state.editName=e.target.value;inp.focus()}}
function renderMain(sp,rec){const box=document.getElementById('mainPanel');if(!sp){box.innerHTML='<div class="small" style="text-align:center;padding:70px">请先在左侧选择一个人员</div>';return}const projectList=projects(state.currentCity);const history=Object.entries(sp.records||{}).map(([d,r])=>({d,total:r.total||0,count:countTotal(r.counts)})).sort((a,b)=>b.d.localeCompare(a.d));const personMonth=Object.entries(sp.records||{}).filter(([d])=>d.startsWith(state.selectedMonth)).map(([d,r])=>({d,total:r.total||0,count:countTotal(r.counts)})).sort((a,b)=>a.d.localeCompare(b.d));const personRange=Object.entries(sp.records||{}).filter(([d])=>inRange(d,state.rangeStart,state.rangeEnd)).map(([d,r])=>({d,total:r.total||0,count:countTotal(r.counts)})).sort((a,b)=>a.d.localeCompare(b.d));
 box.innerHTML=`<div class="between"><div><h2 style="margin:0">${sp.name} 的绩效计算</h2><p class="muted">门店：${sp.city} ｜ 日期：${fmtDate(state.selectedDate)}</p></div><div style="text-align:right"><div class="small">所选日期总绩效</div><div class="stat-value">¥${rec.total||0}</div></div></div><div class="project-grid">${projectList.map(p=>`<div class="project"><div class="badge">${rec.counts?.[p.name]||0}</div><div class="project-title">${p.name}</div><div class="money">单项绩效：¥${p.amount}</div><div class="project-actions"><button class="btn" onclick="changeCount('${p.name}',-1)">－</button><button class="btn primary" onclick="changeCount('${p.name}',1)">＋</button></div></div>`).join('')}</div><div class="row section"><button class="btn green" onclick="calculateDate()">计算所选日期总和</button><button class="btn" onclick="resetDate()">清空所选日期记录</button></div><div class="panel section"><b>所选日期记录</b><div class="small">日期：${state.selectedDate} ｜ 人员：${sp.name} ｜ 项目总次数：${countTotal(rec.counts)} ｜ 绩效总和：¥${rec.total||0} ｜ 录入方式：${rec.entryMode==='manual'?'直接录入':'单项计算'}</div>${rec.calculatedAt?`<div class="small">最后计算时间：${rec.calculatedAt}</div>`:''}</div>${historyBlock('历史日期查询',history)}${rangeBlock(personRange)}${monthBlock(personMonth)}`;
 document.getElementById('rangeStartPerson').value=state.rangeStart;document.getElementById('rangeEndPerson').value=state.rangeEnd;document.getElementById('monthPerson').value=state.selectedMonth;
}
function historyBlock(title,arr){return `<div class="panel section"><div class="section-title">${title}</div>${arr.length?arr.map(x=>`<button class="btn" style="width:100%;text-align:left;margin-bottom:8px" onclick="setDate('${x.d}')">${x.d} ｜ 总绩效：¥${x.total}</button>`).join(''):'<div class="small">暂无历史记录</div>'}</div>`}
function rangeBlock(arr){const total=arr.reduce((s,x)=>s+x.total,0), count=arr.reduce((s,x)=>s+x.count,0);return `<div class="panel section"><div class="between"><div><div class="section-title">时间段绩效统计</div><div class="small">选起始日期后默认截止日期=起始日期+15天，可手动改</div></div><div class="row"><input class="input" id="rangeStartPerson" type="date" onchange="changeRangeStart(this.value)"><input class="input" id="rangeEndPerson" type="date" onchange="changeRangeEnd(this.value)"></div></div><div class="grid3">${stat('时间段出单天数',arr.length)+stat('时间段项目次数',count)+stat('时间段总绩效','¥'+total)}</div>${simpleTable(arr,'当日绩效')}</div>`}
function monthBlock(arr){const total=arr.reduce((s,x)=>s+x.total,0);return `<div class="panel section"><div class="between"><div><div class="section-title">每人绩效按月汇总</div><div class="small">查看所选月份的每日累计绩效</div></div><input class="input" id="monthPerson" type="month" onchange="changeMonth(this.value)"></div><div class="grid3">${stat('月出单天数',arr.length)+stat('月总绩效','¥'+total)+stat('统计月份',state.selectedMonth)}</div>${simpleTable(arr,'当日绩效')}</div>`}
function simpleTable(arr,label){if(!arr.length)return'<div class="small">暂无记录</div>';return `<div class="scroll"><table><thead><tr><th>日期</th><th>项目次数</th><th>${label}</th></tr></thead><tbody>${arr.map(x=>`<tr><td><button class="btn" onclick="setDate('${x.d}')">${x.d}</button></td><td>${x.count}</td><td><b>¥${x.total}</b></td></tr>`).join('')}</tbody></table></div>`}
function renderTables(msum,rsum,mt,rt){document.getElementById('daySummary').innerHTML=dailySummaryTable();
 document.getElementById('rangeSummary').innerHTML=`<div class="between"><div><h2>所有人时间段总绩效统计</h2><p class="muted">当前门店：${state.currentCity} ｜ 区间：${state.rangeStart} 至 ${state.rangeEnd}</p></div><div class="row"><input class="input" type="date" value="${state.rangeStart}" onchange="changeRangeStart(this.value)"><input class="input" type="date" value="${state.rangeEnd}" onchange="changeRangeEnd(this.value)"><button class="btn primary" onclick="exportRange()">导出区间汇总 Excel</button></div></div><div class="grid3">${stat('全店区间总绩效','¥'+rt.total)+stat('全店区间项目总次数',rt.count)+stat('全店区间累计出单天数',rt.days)}</div>`+tableRows(rsum,['排名','人员','出单天数','项目总次数','区间总绩效'],x=>[x.name,x.days,x.count,'¥'+x.total]);
 document.getElementById('monthSummary').innerHTML=`<div class="between"><div><h2>所有人某月总绩效统计</h2><p class="muted">当前门店：${state.currentCity} ｜ 月份：${state.selectedMonth}</p></div><div class="row"><input class="input" type="month" value="${state.selectedMonth}" onchange="changeMonth(this.value)"><button class="btn primary" onclick="exportMonth()">导出月汇总 Excel</button></div></div><div class="grid3">${stat('全店月总绩效','¥'+mt.total)+stat('全店项目总次数',mt.count)+stat('全店累计出单天数',mt.days)}</div>`+tableRows(msum,['排名','人员','出单天数','项目总次数','月总绩效'],x=>[x.name,x.days,x.count,'¥'+x.total])}
function dailySummaryTable(){
 const arr=daySummary();
 return `<div class="between"><div><h2>人员每日绩效汇总</h2><p class="muted">当前门店：${state.currentCity} ｜ 日期：${state.selectedDate}</p></div><div class="row"><button class="btn primary" onclick="addDailyPerson()">新增人员</button><button class="btn green" onclick="exportDay()">导出当日汇总 Excel</button></div></div>
 <div class="small" style="margin-bottom:10px">点击“总绩效”金额可直接修改，不需要经过单项计算。</div>
 <div class="scroll"><table><thead><tr><th>排名</th><th>人员</th><th>项目次数</th><th>总绩效</th><th>操作</th></tr></thead><tbody>${arr.length?arr.map((x,i)=>`<tr><td>${i+1}</td><td><button class="btn" onclick="selectPerson('${x.id}')">${escapeHtml(x.name)}</button></td><td>${x.count}</td><td><button class="btn" style="font-weight:800;min-width:90px" title="点击直接修改总绩效" onclick="editDailyTotal('${x.id}')">¥${formatMoney(x.total)}</button></td><td><div class="row"><button class="btn" onclick="editPersonDaily('${x.id}')">编辑</button><button class="btn red" onclick="deleteDailyPerson('${x.id}')">删除</button></div></td></tr>`).join(''):`<tr><td colspan="5" class="small">当前门店暂无人员，请点击“新增人员”。</td></tr>`}</tbody></table></div>`;
}
function escapeHtml(value){return String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function formatMoney(value){const n=Number(value)||0;return Number.isInteger(n)?String(n):n.toFixed(2).replace(/\.?0+$/,'')}
function editDailyTotal(id){const p=state.people.find(x=>x.id===id);if(!p)return;const r=ensureRecord(p,state.selectedDate);const value=prompt(`修改 ${p.name} 在 ${state.selectedDate} 的总绩效：`,String(r.total||0));if(value===null)return;const amount=Number(String(value).replace(/[,，￥¥\s]/g,''));if(!Number.isFinite(amount)||amount<0){alert('请输入大于或等于 0 的正确金额');return}r.total=Math.round(amount*100)/100;r.entryMode='manual';r.calculatedAt=new Date().toLocaleString();state.selectedPersonId=p.id;render()}
function addDailyPerson(){const name=prompt('请输入新增人员姓名：','');if(name===null)return;const cleanName=name.trim();if(!cleanName){alert('人员姓名不能为空');return}const duplicated=state.people.find(p=>p.city===state.currentCity&&p.name===cleanName);if(duplicated){alert('当前门店已经存在同名人员，将直接为你打开该人员。');state.selectedPersonId=duplicated.id;render();return}const moneyText=prompt(`请输入 ${cleanName} 在 ${state.selectedDate} 的总绩效：`,'0');if(moneyText===null)return;const amount=Number(String(moneyText).replace(/[,，￥¥\s]/g,''));if(!Number.isFinite(amount)||amount<0){alert('请输入大于或等于 0 的正确金额');return}const p={id:uid(),name:cleanName,city:state.currentCity,records:{}};state.people.push(p);const r=ensureRecord(p,state.selectedDate);r.total=Math.round(amount*100)/100;r.entryMode='manual';r.calculatedAt=new Date().toLocaleString();state.selectedPersonId=p.id;render()}
function editPersonDaily(id){const p=state.people.find(x=>x.id===id);if(!p)return;const name=prompt('修改人员姓名：',p.name);if(name===null)return;const cleanName=name.trim();if(!cleanName){alert('人员姓名不能为空');return}const duplicated=state.people.find(x=>x.id!==id&&x.city===p.city&&x.name===cleanName);if(duplicated){alert('当前门店已经存在同名人员');return}const r=ensureRecord(p,state.selectedDate);const moneyText=prompt(`修改 ${cleanName} 在 ${state.selectedDate} 的总绩效：`,String(r.total||0));if(moneyText===null)return;const amount=Number(String(moneyText).replace(/[,，￥¥\s]/g,''));if(!Number.isFinite(amount)||amount<0){alert('请输入大于或等于 0 的正确金额');return}p.name=cleanName;r.total=Math.round(amount*100)/100;r.entryMode='manual';r.calculatedAt=new Date().toLocaleString();state.selectedPersonId=p.id;render()}
function deleteDailyPerson(id){const p=state.people.find(x=>x.id===id);if(!p)return;if(!confirm(`确定删除“${p.name}”吗？该人员全部日期的绩效记录都会一起删除。`))return;state.people=state.people.filter(x=>x.id!==id);if(state.selectedPersonId===id)state.selectedPersonId=peopleInCity()[0]?.id||null;render()}
function summaryTable(title,sub,arr,heads,map,action){return `<div class="between"><div><h2>${title}</h2><p class="muted">${sub}</p></div>${action||''}</div>`+tableRows(arr,heads,map)}
function tableRows(arr,heads,map){if(!arr.length)return'<div class="small">暂无记录</div>';return `<div class="scroll"><table><thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${arr.map((x,i)=>`<tr><td>${i+1}</td>${map(x).map((v,j)=>j===0?`<td><button class="btn" onclick="selectPerson('${x.id}')">${v}</button></td>`:`<td>${v}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function selectPerson(id){state.selectedPersonId=id;render()}function setDate(d){state.selectedDate=d;render()}function changeMonth(v){state.selectedMonth=v;render()}function changeRangeStart(v){state.rangeStart=v;state.rangeEnd=addDays(v,15);render()}function changeRangeEnd(v){state.rangeEnd=v;render()}
function changeCount(name,delta){const sp=selectedPerson();if(!sp)return;const r=ensureRecord(sp,state.selectedDate);r.counts[name]=Math.max(0,(r.counts[name]||0)+delta);render()}function calculateDate(){const sp=selectedPerson();if(!sp)return;const r=ensureRecord(sp,state.selectedDate);r.total=calcTotal(sp.city,r.counts);r.calculatedAt=new Date().toLocaleString();r.entryMode='item';render()}function resetDate(){const sp=selectedPerson();if(!sp)return;sp.records[state.selectedDate]={city:sp.city,counts:emptyCounts(sp.city),total:0,calculatedAt:'',entryMode:'item'};render()}
function startEdit(id){const p=state.people.find(x=>x.id===id);state.editingId=id;state.editName=p?.name||'';render()}function saveEdit(id){const p=state.people.find(x=>x.id===id);if(p&&state.editName.trim())p.name=state.editName.trim();state.editingId=null;state.editName='';render()}function cancelEdit(){state.editingId=null;state.editName='';render()}
function askDelete(id){state.deleteTarget=state.people.find(p=>p.id===id);document.getElementById('deleteText').textContent=`确定删除 “${state.deleteTarget.name}” 吗？删除后该人员记录也会一起移除。`;document.getElementById('deleteModal').classList.remove('hidden')}function doDelete(){if(state.deleteTarget){state.people=state.people.filter(p=>p.id!==state.deleteTarget.id);if(state.selectedPersonId===state.deleteTarget.id)state.selectedPersonId=peopleInCity()[0]?.id||null}state.deleteTarget=null;document.getElementById('deleteModal').classList.add('hidden');render()}function cancelDelete(){state.deleteTarget=null;document.getElementById('deleteModal').classList.add('hidden')}
function exportDay(){const header=['日期','城市','人员','项目总次数','总绩效',...projects(state.currentCity).map(p=>p.name)];const rows=daySummary().map(x=>{const p=state.people.find(a=>a.id===x.id),r=p?.records?.[state.selectedDate];return[state.selectedDate,x.city,x.name,x.count,x.total,...projects(state.currentCity).map(pj=>r?.counts?.[pj.name]||0)]});exportCsv([header,...rows],`${state.currentCity}_${state.selectedDate}_绩效表.csv`)}
function exportRange(){const rows=rangeSummary().map(x=>[state.rangeStart,state.rangeEnd,x.city,x.name,x.days,x.count,x.total]);const t=totalOf(rangeSummary());rows.push([state.rangeStart,state.rangeEnd,state.currentCity,'全店合计',t.days,t.count,t.total]);exportCsv([['起始日期','截止日期','城市','人员','出单天数','项目总次数','时间段总绩效'],...rows],`${state.currentCity}_${state.rangeStart}_至_${state.rangeEnd}_区间绩效汇总.csv`)}
function exportMonth(){const rows=monthSummary().map(x=>[state.selectedMonth,x.city,x.name,x.days,x.count,x.total]);const t=totalOf(monthSummary());rows.push([state.selectedMonth,state.currentCity,'全店合计',t.days,t.count,t.total]);exportCsv([['月份','城市','人员','出单天数','项目总次数','月总绩效'],...rows],`${state.currentCity}_${state.selectedMonth}_月绩效汇总.csv`)}

function renderManualPeople(){const sel=document.getElementById('manualPerson');if(!sel)return;const arr=peopleInCity();sel.innerHTML=arr.length?arr.map(p=>`<option value="${p.id}">${p.name}</option>`).join(''):'<option value="">暂无人员</option>';if(state.selectedPersonId&&arr.some(p=>p.id===state.selectedPersonId))sel.value=state.selectedPersonId;document.getElementById('manualDate').value=state.selectedDate}
function saveManualPerformance(){const id=document.getElementById('manualPerson').value,date=document.getElementById('manualDate').value,amount=Number(document.getElementById('manualAmount').value);const p=state.people.find(x=>x.id===id);if(!p||!date||!Number.isFinite(amount)||amount<0){alert('请选择人员、日期并填写正确金额');return}const r=ensureRecord(p,date);r.total=Math.round(amount*100)/100;r.calculatedAt=new Date().toLocaleString();r.entryMode='manual';state.selectedPersonId=p.id;state.selectedDate=date;document.getElementById('manualAmount').value='';render()}
function openSettings(){document.getElementById('settingsCity').textContent=state.currentCity;renderSettingsList();document.getElementById('settingsModal').classList.remove('hidden')}
function renderSettingsList(){const box=document.getElementById('settingsList');box.innerHTML=projects(state.currentCity).map((p,i)=>`<div class="settings-grid" style="margin-bottom:8px"><input class="input" data-project-name="${i}" value="${String(p.name).replace(/"/g,'&quot;')}"><input class="input" data-project-amount="${i}" type="number" min="0" step="0.01" value="${p.amount}"><button class="btn red" onclick="removeProject(${i})">删除</button></div>`).join('')||'<div class="small">暂无项目</div>'}
function collectSettings(){const names=[...document.querySelectorAll('[data-project-name]')],amounts=[...document.querySelectorAll('[data-project-amount]')];return names.map((n,i)=>({name:n.value.trim(),amount:Number(amounts[i].value)||0})).filter(x=>x.name)}
function saveProjectSettings(){state.projectSettings[state.currentCity]=collectSettings();document.getElementById('settingsModal').classList.add('hidden');render()}
function removeProject(i){state.projectSettings[state.currentCity]=collectSettings();state.projectSettings[state.currentCity].splice(i,1);renderSettingsList()}
function addProjectSetting(){state.projectSettings[state.currentCity]=collectSettings();const name=document.getElementById('newProjectName').value.trim(),amount=Number(document.getElementById('newProjectAmount').value);if(!name||!Number.isFinite(amount)||amount<0){alert('请填写项目名称和正确金额');return}state.projectSettings[state.currentCity].push({name,amount});document.getElementById('newProjectName').value='';document.getElementById('newProjectAmount').value='';renderSettingsList()}
function resetProjectSettings(){state.projectSettings[state.currentCity]=JSON.parse(JSON.stringify(DEFAULT_PROJECTS[state.currentCity]||[]));renderSettingsList()}
function parseCsvLine(line){const out=[];let cur='',quote=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(quote&&line[i+1]==='"'){cur+='"';i++}else quote=!quote}else if((c===','||c==='\t')&&!quote){out.push(cur.trim());cur=''}else cur+=c}out.push(cur.trim());return out}
function importPerformanceFile(file){const reader=new FileReader();reader.onload=()=>{try{const lines=String(reader.result).replace(/^\uFEFF/,'').split(/\r?\n/).filter(x=>x.trim());if(lines.length<2)throw new Error('文件没有数据');const head=parseCsvLine(lines[0]);const idx={date:head.findIndex(x=>['日期','date'].includes(x.toLowerCase())),city:head.findIndex(x=>['城市','门店','city'].includes(x.toLowerCase())),name:head.findIndex(x=>['人员','姓名','name'].includes(x.toLowerCase())),amount:head.findIndex(x=>['绩效','绩效金额','总绩效','amount','total'].includes(x.toLowerCase()))};if(idx.date<0||idx.name<0||idx.amount<0)throw new Error('表头至少需要：日期、人员、绩效金额');let ok=0;for(const line of lines.slice(1)){const row=parseCsvLine(line),date=row[idx.date],name=row[idx.name],city=idx.city>=0?(row[idx.city]||state.currentCity):state.currentCity,amount=Number(row[idx.amount]);if(!date||!name||!Number.isFinite(amount))continue;let p=state.people.find(x=>x.name===name&&x.city===city);if(!p){p={id:uid(),name,city,records:{}};state.people.push(p)}const r=ensureRecord(p,date);r.total=Math.round(amount*100)/100;r.calculatedAt=new Date().toLocaleString();r.entryMode='manual';ok++}alert(`成功导入 ${ok} 条每日绩效记录`);render()}catch(e){alert('导入失败：'+e.message)}finally{document.getElementById('uploadPerfFile').value=''}};reader.readAsText(file,'utf-8')}
document.getElementById('cityCs').onclick=()=>{state.currentCity='长沙店';state.selectedPersonId=peopleInCity()[0]?.id||null;render()};document.getElementById('cityCd').onclick=()=>{state.currentCity='成都店';state.selectedPersonId=peopleInCity()[0]?.id||null;render()};document.getElementById('selectedDate').onchange=e=>{state.selectedDate=e.target.value;render()};document.getElementById('addPerson').onclick=()=>{const name=document.getElementById('newName').value.trim();if(!name)return;const p={id:uid(),name,city:state.currentCity,records:{}};state.people.push(p);state.selectedPersonId=p.id;document.getElementById('newName').value='';render()};document.getElementById('newName').onkeydown=e=>{if(e.key==='Enter')document.getElementById('addPerson').click()};document.getElementById('exportDay').onclick=exportDay;document.getElementById('cancelDelete').onclick=cancelDelete;document.getElementById('confirmDelete').onclick=doDelete;document.getElementById('saveManualPerf').onclick=saveManualPerformance;document.getElementById('openSettings').onclick=openSettings;document.getElementById('closeSettings').onclick=()=>document.getElementById('settingsModal').classList.add('hidden');document.getElementById('saveSettings').onclick=saveProjectSettings;document.getElementById('addProject').onclick=addProjectSetting;document.getElementById('resetProjects').onclick=resetProjectSettings;document.getElementById('uploadPerfBtn').onclick=()=>document.getElementById('uploadPerfFile').click();document.getElementById('uploadPerfFile').onchange=e=>{const f=e.target.files?.[0];if(f)importPerformanceFile(f)};
load();if(!state.selectedPersonId)state.selectedPersonId=peopleInCity()[0]?.id||null;render();
</script>
